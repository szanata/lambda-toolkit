name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  main:
    name: Publish NPM Package
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}
    container:
      image: node:24.13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: ./ops/build.sh

      - name: Publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./ops/publish.sh
